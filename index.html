<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThermE.Y.E. - Appliances Thermal Monitoring System</title>
    <style>
        :root {
            /* Dark Mode (Default) */
            --bg-base: #090d16;
            --bg-surface: #131c2e;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --border: #1e293b;
            --card-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.3);
            --loader-bg: #090d16;
        }

        /* Light Mode Classes */
        html[data-theme="light"] {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --card-shadow: 0 4px 18px -4px rgba(148, 163, 184, 0.12);
            --loader-bg: #f8fafc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            padding: 2.5rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- LOADING PAGE / SPLASH SCREEN --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--loader-bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            opacity: 1;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        #loading-screen.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-container {
            max-width: 500px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
        }

        .loader-logo {
            width: 140px;
            height: 140px;
            object-fit: contain;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
            animation: pulseLogo 2.5s infinite ease-in-out;
        }

        .loader-school {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            max-width: 420px;
            line-height: 1.4;
        }

        .loader-project {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #3b82f6, #60a5fa, #1d4ed8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: -0.25rem;
        }

        .loader-tagline {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        /* Modern Progress Bar */
        .progress-bar-container {
            width: 70%;
            max-width: 240px;
            height: 5px;
            background-color: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, var(--primary), #60a5fa);
            border-radius: 10px;
            animation: fillProgress 3s forwards cubic-bezier(0.1, 0.85, 0.25, 1);
        }

        .loader-developers {
            border-top: 1px solid var(--border);
            padding-top: 1.25rem;
            width: 100%;
        }

        .dev-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            font-weight: 700;
        }

        .dev-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem 1.5rem;
            justify-content: center;
        }

        .dev-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15)); }
            50% { transform: scale(1.04); filter: drop-shadow(0 8px 24px var(--primary-glow)); }
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* --- DASHBOARD STYLES (ORIGINAL) --- */
        .header-controls {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto 2rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-controls h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-btn {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: var(--card-shadow);
        }

        .theme-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
            transform: translateY(-1px);
        }
        
        .theme-btn:active {
            transform: translateY(0);
        }

        .dashboard {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .dashboard {
                grid-template-columns: 2fr 1fr;
            }
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: var(--card-shadow);
        }

        .hero-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            min-height: 320px;
            overflow: hidden;
        }

        .temp-display {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            margin: 1.25rem 0;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-safe { color: var(--success); text-shadow: 0 0 30px rgba(16, 185, 129, 0.1); }
        .status-warning { color: var(--warning); text-shadow: 0 0 30px rgba(245, 158, 11, 0.1); }
        .status-danger { color: var(--danger); text-shadow: 0 0 30px rgba(244, 63, 94, 0.15); }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .status-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        
        .status-row:first-of-type {
            padding-top: 0.5rem;
        }

        .badge {
            padding: 0.35rem 0.85rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .badge.online, .badge.connected {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .badge.offline, .badge.disconnected {
            background-color: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--danger);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            grid-column: 1 / -1;
        }

        .stat-card {
            text-align: center;
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            box-shadow: var(--card-shadow);
            position: relative;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            border-radius: 0 0 4px 4px;
        }
        
        #highTemp-card::before { background-color: var(--danger); }
        #lowTemp-card::before { background-color: var(--primary); }
        #avgTemp-card::before { background-color: var(--warning); }

        .stat-val {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0.6rem;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        input[type="number"] {
            width: 100%;
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .alert-banner {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.2), rgba(244, 63, 94, 0.05));
            border: 1px solid var(--danger);
            color: #ffffff;
            padding: 1.2rem 1.5rem;
            border-radius: 14px;
            display: none;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px -10px rgba(244, 63, 94, 0.3);
            animation: pulseAlert 2s infinite alternate;
        }

        @keyframes pulseAlert {
            0% { box-shadow: 0 4px 20px -5px rgba(244, 63, 94, 0.2); }
            100% { box-shadow: 0 4px 25px 2px rgba(244, 63, 94, 0.4); }
        }

        .text-muted { 
            color: var(--text-muted); 
            font-weight: 500;
        }
        
        h3 {
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <!-- Loading Screen Overlay -->
    <div id="loading-screen">
        <div class="loader-container">
            <img class="loader-logo" src="logo.jpg" alt="ThermE.Y.E. Logo">
            <!-- Rest of the loader layout... -->
        </div>
    </div>

</body>
</html>
