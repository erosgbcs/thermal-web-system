<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appliances Thermal Monitoring System</title>
    <style>
        :root {
            /* Dark Mode (Default) */
            --bg-base: #090d16;
            --bg-surface: #131c2e;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.15);
            --success: #10b981;
            --danger: #f43f5e;
            --warning: #f59e0b;
            --border: #1e293b;
            --card-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.3);
        }

        /* Light Mode Classes */
        html[data-theme="light"] {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --card-shadow: 0 4px 18px -4px rgba(148, 163, 184, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease, box-shadow 0.25s ease;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            padding: 2.5rem 1.5rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Header Layout for Title and Toggle Button */
        .header-controls {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto 2rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-controls h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(to right, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .theme-btn {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: var(--card-shadow);
        }

        .theme-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 12px var(--primary-glow);
            transform: translateY(-1px);
        }
        
        .theme-btn:active {
            transform: translateY(0);
        }

        .dashboard {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 768px) {
            .dashboard {
                grid-template-columns: 2fr 1fr;
            }
        }

        .card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.75rem;
            box-shadow: var(--card-shadow);
        }

        /* Hero Temperature Display */
        .hero-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            min-height: 320px;
            overflow: hidden;
        }

        .temp-display {
            font-size: 6rem;
            font-weight: 900;
            line-height: 1;
            margin: 1.25rem 0;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
            transition: color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Dynamic Status Colors */
        .status-safe { color: var(--success); text-shadow: 0 0 30px rgba(16, 185, 129, 0.1); }
        .status-warning { color: var(--warning); text-shadow: 0 0 30px rgba(245, 158, 11, 0.1); }
        .status-danger { color: var(--danger); text-shadow: 0 0 30px rgba(244, 63, 94, 0.15); }

        /* Status & Config Sidebar */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .status-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        
        .status-row:first-of-type {
            padding-top: 0.5rem;
        }

        .badge {
            padding: 0.35rem 0.85rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .badge.online, .badge.connected {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .badge.offline, .badge.disconnected {
            background-color: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: var(--danger);
        }

        /* Statistics Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            grid-column: 1 / -1;
        }

        .stat-card {
            text-align: center;
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            box-shadow: var(--card-shadow);
            position: relative;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 3px;
            border-radius: 0 0 4px 4px;
        }
        
        #highTemp-card::before { background-color: var(--danger); }
        #lowTemp-card::before { background-color: var(--primary); }
        #avgTemp-card::before { background-color: var(--warning); }

        .stat-val {
            font-size: 2rem;
            font-weight: 800;
            margin-top: 0.6rem;
            letter-spacing: -0.02em;
            font-variant-numeric: tabular-nums;
        }

        /* Input Controls */
        label {
            display: block;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }

        input[type="number"] {
            width: 100%;
            background-color: var(--bg-base);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.85rem 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        /* Alert Banner */
        .alert-banner {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, rgba(244, 63, 94, 0.2), rgba(244, 63, 94, 0.05));
            border: 1px solid var(--danger);
            color: #ffffff;
            padding: 1.2rem 1.5rem;
            border-radius: 14px;
            display: none;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 10px 30px -10px rgba(244, 63, 94, 0.3);
            animation: pulseAlert 2s infinite alternate;
        }

        @keyframes pulseAlert {
            0% { box-shadow: 0 4px 20px -5px rgba(244, 63, 94, 0.2); }
            100% { box-shadow: 0 4px 25px 2px rgba(244, 63, 94, 0.4); }
        }

        .text-muted { 
            color: var(--text-muted); 
            font-weight: 500;
        }
        
        h3 {
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <!-- Header Actions Panel -->
    <div class="header-controls">
        <h2>Appliance Thermal Monitoring</h2>
        <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme">
            <span id="themeIcon">☀️</span> <span id="themeText">Light Mode</span>
        </button>
    </div>

    <div class="dashboard">
        <!-- Alert Banner Notification -->
        <div id="alertBanner" class="alert-banner">
            🚨 Warning: Appliance core temperature has breached the safe limit!
        </div>

        <!-- Main Live Readout -->
        <div class="card hero-card">
            <span class="text-muted" style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.08em; font-weight: 700;">Current Appliance Temperature</span>
            <div id="currentTemp" class="temp-display">--.-°C</div>
            <span id="tempStatusText" class="text-muted" style="font-size: 0.95rem;">Appliance Monitoring Active</span>
        </div>

        <!-- Sidebar Info & Controls -->
        <div class="sidebar">
            <!-- System Status Information -->
            <div class="card">
                <h3 style="margin-bottom: 1.25rem; font-size: 1.15rem;">System Diagnostics</h3>
                
                <div class="status-row">
                    <span class="text-muted">Device Unit</span>
                    <span id="deviceBadge" class="badge offline">Offline</span>
                </div>
                
                <div class="status-row">
                    <span class="text-muted">Telemetry Database</span>
                    <span id="dbBadge" class="badge disconnected">Disconnected</span>
                </div>
            </div>

            <!-- Settings / Limits -->
            <div class="card">
                <h3 style="margin-bottom: 1.25rem; font-size: 1.15rem;">System Thresholds</h3>
                <label for="limitInput">Safe Appliance Limit (°C)</label>
                <input type="number" id="limitInput" value="22" min="5" max="40" step="0.5">
            </div>
        </div>

        <!-- Historical Stats System -->
        <div class="stats-grid">
            <div class="stat-card" id="highTemp-card">
                <span class="text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Highest</span>
                <div id="highTemp" class="stat-val">--.-°C</div>
            </div>
            <div class="stat-card" id="lowTemp-card">
                <span class="text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Lowest</span>
                <div id="lowTemp" class="stat-val">--.-°C</div>
            </div>
            <div class="stat-card" id="avgTemp-card">
                <span class="text-muted" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700;">Average</span>
                <div id="avgTemp" class="stat-val">--.-°C</div>
            </div>
        </div>
    </div>

    <script>
        // Runtime Data Storage State
        const dataLog = [];
        let safeLimit = 22.0;

        // --- ALARM SOUND CONTROLLER ENGINE ---
        let audioCtx = null;
        let sirenNodes = null;

        function startSiren() {
            // If already sounding, do nothing
            if (sirenNodes) return;

            try {
                // Initialize context on first user interaction or alert execution
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }

                // If browser suspended audio to prevent unsolicited noise, resume it
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                // Main alarm pitch source
                const oscillator = audioCtx.createOscillator();
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(650, audioCtx.currentTime); 

                // Low-frequency oscillator to handle the "pulsing / wave" volume effect
                const modulator = audioCtx.createOscillator();
                modulator.type = 'sine';
                modulator.frequency.setValueAtTime(3, audioCtx.currentTime); // 3 pulses per second

                // Modulator gain depth mapping
                const modulatorGain = audioCtx.createGain();
                modulatorGain.gain.setValueAtTime(150, audioCtx.currentTime);

                // Main volume limiter node
                const volumeNode = audioCtx.createGain();
                volumeNode.gain.setValueAtTime(0.15, audioCtx.currentTime); // 15% volume baseline

                // Route audio pipeline map
                modulator.connect(modulatorGain);
                modulatorGain.connect(oscillator.frequency);
                oscillator.connect(volumeNode);
                volumeNode.connect(audioCtx.destination);

                // Ignite synthesizers
                modulator.start();
                oscillator.start();

                // Save references securely so we can shut it down cleanly later
                sirenNodes = { oscillator, modulator };
            } catch (error) {
                console.error("Audio system waiting for user gesture initialization...", error);
            }
        }

        function stopSiren() {
            if (sirenNodes) {
                try {
                    sirenNodes.oscillator.stop();
                    sirenNodes.modulator.stop();
                } catch(e) {}
                sirenNodes = null;
            }
        }

        // Auto-unlock audio engine on any random background click anywhere
        document.body.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });


        // Cache DOM elements
        const currentTempEl = document.getElementById('currentTemp');
        const highTempEl = document.getElementById('highTemp');
        const lowTempEl = document.getElementById('lowTemp');
        const avgTempEl = document.getElementById('avgTemp');
        const alertBanner = document.getElementById('alertBanner');
        const tempStatusText = document.getElementById('tempStatusText');
        const deviceBadge = document.getElementById('deviceBadge');
        const dbBadge = document.getElementById('dbBadge');
        const limitInput = document.getElementById('limitInput');
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        // Theme Toggle Handler Engine
        function setTheme(theme) {
            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                themeIcon.innerText = "🌙";
                themeText.innerText = "Dark Mode";
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.removeAttribute('data-theme');
                themeIcon.innerText = "☀️";
                themeText.innerText = "Light Mode";
                localStorage.setItem('theme', 'dark');
            }
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'light') {
                setTheme('dark');
            } else {
                setTheme('light');
            }
        });

        // Initialize Theme from User Preference Saved History
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            setTheme('light');
        } else {
            setTheme('dark'); // Default System State
        }

        // Track threshold adjustments
        limitInput.addEventListener('input', (e) => {
            safeLimit = parseFloat(e.target.value) || 22.0;
            if(dataLog.length > 0) evaluateMetrics(dataLog[dataLog.length - 1]);
        });

        // Function to update stats cards and apply conditional color coding
        function evaluateMetrics(newTemp) {
            dataLog.push(newTemp);

            const highest = Math.max(...dataLog);
            const lowest = Math.min(...dataLog);
            const average = dataLog.reduce((a, b) => a + b, 0) / dataLog.length;

            // Render text updates
            currentTempEl.innerText = `${newTemp.toFixed(1)}°C`;
            highTempEl.innerText = `${highest.toFixed(1)}°C`;
            lowTempEl.innerText = `${lowest.toFixed(1)}°C`;
            avgTempEl.innerText = `${average.toFixed(1)}°C`;

            // Reset dynamic text color classes
            currentTempEl.className = "temp-display";
            tempStatusText.className = "text-muted";

            // Apply multi-stage color alert logic
            if (newTemp >= safeLimit) {
                // BREACHED: Critical Red State
                currentTempEl.classList.add('status-danger');
                alertBanner.style.display = 'block';
                tempStatusText.innerText = "Appliance Temperature Critical";
                tempStatusText.classList.add('status-danger');
                
                // Fire the siren synthesizer loop
                startSiren();
            } else if (newTemp >= safeLimit - 2.0) {
                // WARNING: Cautionary Yellow State (within 2°C of limit)
                currentTempEl.classList.add('status-warning');
                alertBanner.style.display = 'none';
                tempStatusText.innerText = "Approaching Limit Alert";
                tempStatusText.classList.add('status-warning');
                
                // Turn off alarm since we are safely out of the red zone
                stopSiren();
            } else {
                // SAFE: Normal Green State
                currentTempEl.classList.add('status-safe');
                alertBanner.style.display = 'none';
                tempStatusText.innerText = "Appliance Operational Base Stable";
                tempStatusText.classList.add('status-safe');
                
                // Turn off alarm
                stopSiren();
            }
        }

        // Live Environment Simulator
        function simulateDataPipeline() {
            // Set connection states to active for display
            deviceBadge.className = "badge online";
            deviceBadge.innerText = "Online";
            
            // Simulating Database connection along with device telemetry logic
            dbBadge.className = "badge connected";
            dbBadge.innerText = "Connected";

            // Base simulation tailored down for functional appliances (cycles roughly 18C - 22.5C)
            const simulatedRead = 18.0 + (Math.sin(Date.now() / 5000) * 4.5); 
            evaluateMetrics(simulatedRead);
        }

        // Run data pipeline automatically every 1 second for snappy testing feedback
        setInterval(simulateDataPipeline, 1000);
        simulateDataPipeline(); 
    </script>
</body>
</html>
